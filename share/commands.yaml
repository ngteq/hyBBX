# HyBBX command registry — source for /help /menu /index /alias.
#
# User groups (only these five): Sysop, Admin, Mod, User, Guest.
# Internal storage: sysop admin mod user guest (auth.h).
#
# Proxy network: links user services only (proxymail, proxychat, future).
# No Sysop/Admin/Mod actions cross proxy links — ever.
#
# /broadcast (alias /announce): Sysop sends to all online users on local Main.
# INI [broadcast] ax25_auto is a separate AX.25 beacon — not /broadcast.
#
# Help format (2 lines, max 80 cols):
#   /<verb> placeholders
#   Help: summary. More: subcommands or aliases
# No square brackets in session help/menu text.

meta:
  menu_header: "HyBBX commands /help <cmd> for more"
  index_header: "HyBBX command-index /help <cmd> for more"
  alias_header: "HyBBX aliases /help <cmd> for more"
  command_output: "blank line before /command output; no blank line after"

user_groups:
  - Sysop
  - Admin
  - Mod
  - User
  - Guest

groups:
  general:
    - help
    - menu
    - index
    - alias
    - news
    - motd
    - rules
    - who
    - users
    - session
    - version
  screen:
    - clear
    - echo
  areas:
    - leave
    - main
    - chat
    - conference
    - mail
    - proxymail
    - proxychat
    - exit
  account:
    - login
    - changeme
    - register
    - deleteme
  admin:
    - usercreate
    - activate
    - changeuser
    - promote
    - demote
    - delete
  sysop:
    - deleteuser
    - shutdown
    - restart
    - broadcast

menu:
  Guest:
    - general_guest
    - screen
    - account_guest
  User:
    - general
    - screen
    - areas
    - account_user
  Mod:
    - general
    - screen
    - areas
    - account_user
  Admin:
    - general
    - screen
    - areas
    - account_user
    - admin
  Sysop:
    - general
    - screen
    - areas
    - account_user
    - admin
    - sysop

index:
  - general
  - screen
  - areas
  - account_index
  - admin_index
  - sysop

menu_layouts:
  general_guest:
    - label: General
      verbs: [help, menu, index, alias, news, motd, rules, session, version]
    - label: Screen
      group: screen
  general:
    - label: General
      group: general
  areas:
    - label: Areas
      group: areas
  account_guest:
    - label: Account
      verbs: [login, register]
    - continuation: [exit]
  account_user:
    - label: Account
      verbs: [login, changeme]
      optional: [deleteme]
  account_index:
    - label: Account
      verbs: [login, changeme, register, deleteme]
  admin_full:
    - label: Admin
      group: admin
      omit: [delete]
    - continuation_group: admin
      verbs: [delete]
  admin_activate:
    - label: Admin
      verbs: [activate]
  admin_index:
    - label: Admin
      group: admin
  sysop:
    - label: Sysop
      group: sysop

aliases:
  help:
    - "?"
    - command
    - cmd
    - commands
  rules:
    - legal
  who:
    - online
  version:
    - ver
  session:
    - info
  leave:
    - back
  clear:
    - cls
    - reset
  exit:
    - logout
    - bye
    - quit
  delete:
    - del
  conference:
    - meeting
  usercreate:
    - createuser
  changeuser:
    - userchange
  deleteuser:
    - userdelete
  broadcast:
    - announce
  proxymail:
    - /mail proxymail
  proxychat:
    - /chat proxychat

commands:
  help:
    group: general
    min: Guest
    line1: "/help cmd"
    line2: "Help: List commands or show one command. More: /menu /index /alias."

  menu:
    group: general
    min: Guest
    line1: "/menu"
    line2: "Help: Your command menu. Same as /help with no argument."

  index:
    group: general
    min: Guest
    line1: "/index"
    line2: "Help: Full command-index for this Main. Same for every account."

  alias:
    group: general
    min: Guest
    line1: "/alias"
    line2: "Help: Alternate names for commands. More: see /alias output."

  news:
    group: general
    min: Guest
    line1: "/news"
    line2: "Help: Show system news from news.txt."

  motd:
    group: general
    min: Guest
    line1: "/motd"
    line2: "Help: Show message of the day."

  rules:
    group: general
    min: Guest
    line1: "/rules"
    line2: "Help: Show terms of use from rules.txt. More: /legal"

  who:
    group: general
    min: User
    line1: "/who"
    line2: "Help: Online users and connection type. More: /online"

  users:
    group: general
    min: User
    line1: "/users"
    line2: "Help: Registered users by level (Sysop Admin Mod User Guest)."

  session:
    group: general
    min: Guest
    line1: "/session"
    line2: "Help: Username, session id, transport. More: /info"

  version:
    group: general
    min: Guest
    line1: "/version"
    line2: "Help: HyBBX version and host OS name. More: /ver"

  clear:
    group: screen
    min: Guest
    line1: "/clear"
    line2: "Help: Clear screen and discard input line. More: /cls /reset"

  echo:
    group: screen
    min: Guest
    line1: "/echo yes|no"
    line2: "Help: Show or set typed-character echo."

  leave:
    group: areas
    min: User
    line1: "/leave"
    line2: "Help: Up one area level. More: /back"

  main:
    group: areas
    min: User
    line1: "/main"
    line2: "Help: Return to main prompt."

  chat:
    group: areas
    min: User
    line1: "/chat n|name|show|showall|proxychat"
    line2: "Help: Join or list chat channels. More: /chat proxychat"

  conference:
    group: areas
    min: User
    line1: "/conference topic user"
    line2: "Help: Private two-user channel. More: /meeting"

  mail:
    group: areas
    min: User
    line1: "/mail list|read|send|delete|recycle|proxymail ..."
    line2: "Help: Personal mailbox on this Main. More: list read send delete"

  proxymail:
    group: areas
    min: User
    line1: "/proxymail"
    line2: "Help: mail to user@other-main. More: list read send delete recycle."

  proxychat:
    group: areas
    min: User
    line1: "/proxychat"
    line2: "Help: Chat with users on other mains. More: /chat proxychat"

  exit:
    group: areas
    min: Guest
    line1: "/exit"
    line2: "Help: Close connection. More: /quit /logout /bye"

  login:
    group: account
    min: Guest
    line1: "/login username password"
    line2: "Help: Log in with a registered account."

  register:
    group: account
    min: Guest
    only: Guest
    line1: "/register user name country location email password"
    line2: "Help: Self-registration. Guest only. Sysop and Admin notified."

  changeme:
    group: account
    min: User
    line1: "/changeme old new name country location email"
    line2: "Help: Update own profile and password."

  deleteme:
    group: account
    min: User
    line1: "/deleteme yes|no"
    line2: "Help: Permanently delete own account."

  usercreate:
    group: admin
    min: Admin
    line1: "/usercreate user name country location email"
    line2: "Help: Create user account. Inactive until /activate. More: /createuser"

  activate:
    group: admin
    min: Admin
    line1: "/activate username"
    line2: "Help: Set username activated."

  changeuser:
    group: admin
    min: Admin
    line1: "/changeuser user name country location email password"
    line2: "Help: Overwrite user profile and password. More: /userchange"

  promote:
    group: admin
    min: Admin
    line1: "/promote username admin|mod"
    line2: "Help: Raise user to Admin or Mod."

  demote:
    group: admin
    min: Admin
    line1: "/demote username"
    line2: "Help: Set user to User level."

  delete:
    group: admin
    min: Admin
    line1: "/delete username"
    line2: "Help: Permanently remove account. More: /del"

  deleteuser:
    group: sysop
    min: Sysop
    line1: "/deleteuser username"
    line2: "Help: Delete any non-Sysop account. More: /userdelete"

  shutdown:
    group: sysop
    min: Sysop
    line1: "/shutdown"
    line2: "Help: Stop the HyBBX daemon."

  restart:
    group: sysop
    min: Sysop
    line1: "/restart"
    line2: "Help: Restart the HyBBX daemon."

  broadcast:
    group: sysop
    min: Sysop
    line1: "/broadcast message"
    line2: "Help: Send message to all online users on this Main. More: /announce"

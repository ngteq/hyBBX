; Minimal local HyBBX config (telnet on 127.0.0.1:2323).
; Build/install: CMake only. Start: ./scripts/hybbx.sh

[service]
name = hyBBX

[storage]
backend = flatfile
path = ./local/data

[auth]
auto_login = yes
guest_prefix = Guest

[traffic]
baud = 2400
line_width = 40
pace_output = yes
ansi = no

[texts]
path = ./text

[chat]
channels = 10
message_max = 72

[transport.telnet]
enabled = yes
bind = 127.0.0.1
port = 2323

[circuit]
enabled = yes
bind = 127.0.0.1
bind6 = ::1
port = 7323

[transport.packet_radio]
enabled = no
; circuit_host = 127.0.0.1
; circuit_port = 7323
; g3ruh_fsk = no

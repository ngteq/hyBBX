; Minimal local dev config (loopback) — not the datacenter Main template.
; Production Main defaults: share/hybbx.ini.example (TCP/IP + HBX; ax25 off).
; Build/install: CMake only. Start: ./scripts/hybbx.sh

[service]
name = hyBBX

[storage]
backend = flatfile
path = data

[auth]
auto_login = yes
guest_prefix = Guest

[traffic]
baud = 2400
line_width = 80
pace_output = yes
ansi = no
input_echo = no

[texts]
path = text

[chat]
channels = 10
message_max = 72

[mail]
enabled = yes
max_messages = 50
subject_max = 72
body_max = 2048
recycle_days = 10
path = mail

[networks]
ax25 = no
circuit = yes

[transport.telnet]
enabled = yes
bind = 127.0.0.1
bind6 = ::1
port = 2323
ipv4 = yes
ipv6 = yes

[circuit]
enabled = yes
bind = 127.0.0.1
bind6 = ::1
port = 7323
ipv4 = yes
ipv6 = yes
balance = yes
balance_lag_sec = 8
balance_queue_pause = 8192
balance_queue_break = 32768
balance_queue_cancel = 131072

[transport.packet_radio]
enabled = no
tnc = tnc2c
protocol = kiss
device_type = serial
device = /dev/ttyS4
baud = 19200
serial_line = 8n1
modem = tcm3105
radio_baud = 2400
kiss_on_startup = yes
txdelay = 50
persist = 128
slot = 10
radio_band = amateur
radio_duplex = half
circuit_host = 127.0.0.1
circuit_port = 7323
; Set enabled = yes when HyBBX circuit is running (no radio required for serial/KISS test).

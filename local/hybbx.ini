; Minimal local dev config (loopback) — not the datacenter Main template.
; Production Main defaults: share/hybbx.ini.example (TCP/IP + HBX; ax25 off).
; Build/install: CMake only. Start: ./scripts/hybbx.sh

[service]
name = hyBBX

[storage]
backend = flatfile
path = data

[auth]
auto_login = yes
guest_prefix = Guest

[traffic]
baud = 2400
line_width = 80
pace_output = yes
ansi = no
input_echo = yes

[texts]
path = text

[chat]
channels = 10
message_max = 72

[mail]
enabled = yes
max_messages = 50
subject_max = 72
body_max = 2048
recycle_days = 10
path = mail

[networks]
ax25 = no
circuit = yes

[transport.telnet]
enabled = yes
bind = 127.0.0.1
bind6 = ::1
port = 2323
ipv4 = yes
ipv6 = yes

[circuit]
enabled = yes
bind = 127.0.0.1
bind6 = ::1
port = 7323
ipv4 = yes
ipv6 = yes

[transport.packet_radio]
enabled = no
; circuit_host = 127.0.0.1
; circuit_port = 7323
; g3ruh_fsk = no

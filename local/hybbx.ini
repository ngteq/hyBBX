; Minimal local HyBBX config (telnet on 127.0.0.1:2323).
; Build/install: CMake only. Start: ./scripts/hybbx.sh

[service]
name = hyBBX

[storage]
backend = flatfile
path = ~/.hybbx

[auth]
auto_login = yes
guest_prefix = Guest

[traffic]
baud = 2400
line_width = 80
pace_output = yes
ansi = no
input_echo = yes

[texts]
path = ./text

[chat]
channels = 10
message_max = 72

[networks]
ax25 = no
circuit = yes

[transport.telnet]
enabled = yes
bind = 127.0.0.1
port = 2323
ipv4 = yes
ipv6 = no

[circuit]
enabled = yes
bind = 127.0.0.1
port = 7323
ipv4 = yes
ipv6 = no

[transport.packet_radio]
enabled = no
; circuit_host = 127.0.0.1
; circuit_port = 7323
; g3ruh_fsk = no
